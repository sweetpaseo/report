services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - app_data:/app/data
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  app_data:
